<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="frontstyle.css">
    <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
</head>
</head>
<body>
    <h1>Cope Clicker</h1>
    <div class="contain">
        <button class="easy">Easy</button>
        <button class="med">Medium</button>
        <button class="hard">Hard</button>
    </div>
</body>
<script>
    document.querySelectorAll('.contain button').forEach(button => {
        button.addEventListener('click', () => {
            let stressValue = 860; // Default fallback

            if (button.classList.contains('easy')) {
                stressValue = 500;
            } else if (button.classList.contains('med')) {
                stressValue = 750;
            } else if (button.classList.contains('hard')) {
                stressValue = 900;
            }

            // Save the value to use in the game
            localStorage.setItem('startingStress', stressValue);
            
            // Redirect to the game page (update 'index.html' if your file name is different)
            window.location.href = 'game.html';
        });
    });
</script>
</html>
