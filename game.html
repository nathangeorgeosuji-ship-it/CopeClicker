<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cascading Coping Blocks</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <div class="prog">
            <div class="progress-bar" style="width: 100%;">STRESS 100%</div>
        </div>
        
        <button class="coping-clicker-btn">
            PRESS ME!
            <p class="count">Count: </p>
        </button>
        
        <div class="cont">
           <ul>
            <li class="good locked"><button>Deep breathing</button></li>
            <li class="bad locked"><button>Doomscrolling</button></li>
            <li class="good locked"><button>Grounding</button></li>
            <li class="bad locked"><button>Binge gaming</button></li>
            <li class="good locked"><button>Talking to a friend</button></li>
            <li class="bad locked"><button>Drinking</button></li>
            <li class="good locked"><button>Going for a walk</button></li>
            <li class="bad locked"><button>Cannabis use</button></li>
            <li class="good locked"><button>Sleep</button></li>
            <li class="bad locked"><button>Skipping sleep</button></li>
            <li class="good locked"><button>Journaling</button></li>
            <li class="bad locked"><button>Isolating</button></li>
            <li class="good locked"><button>Exercise</button></li>
            <li class="bad locked"><button>Lashing out</button></li>
            <li class="good locked"><button>Asking for help</button></li>
            <li class="bad locked"><button>Gambling</button></li>
            <li class="good locked"><button>Listening to music</button></li>
            <li class="bad locked"><button>Prescription misuse</button></li>
            <li class="good locked"><button>Helping someone else</button></li>
          </ul>
        </div>
    </div>

    <script src="script.js"></script>
    <div id="ending-overlay">
    <div id="ending-text">
        </div>
</div>
</body>
</html>
